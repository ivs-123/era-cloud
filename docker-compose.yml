services:
  postgres:
    image: postgres:17-alpine
    container_name: era-cloud-postgres
    environment:
      POSTGRES_DB: era_cloud
      POSTGRES_USER: era
      POSTGRES_PASSWORD: era
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U era -d era_cloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - era_cloud_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: era-cloud-api
    ports:
      - "4000:4000"
    environment:
      STORAGE_DRIVER: postgres
      DATABASE_URL: postgres://era:era@postgres:5432/era_cloud
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    container_name: era-cloud-web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000
    depends_on:
      - api

volumes:
  era_cloud_postgres_data:
