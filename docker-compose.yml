services:
  postgres:
    image: postgres:17-alpine
    container_name: era-cloud-postgres
    environment:
      POSTGRES_DB: era_cloud
      POSTGRES_USER: era
      POSTGRES_PASSWORD: era
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U era -d era_cloud"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - era_cloud_postgres_data:/var/lib/postgresql/data

volumes:
  era_cloud_postgres_data:

