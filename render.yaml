services:
  - type: web
    name: era-cloud-api
    runtime: node
    repo: https://github.com/ivs-123/era-cloud
    buildCommand: npm ci --workspaces --if-present && npm run deploy:api
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /health
    disk:
      name: era-cloud-api-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_DRIVER
        value: pglite
      - key: PGLITE_DATA_DIR
        value: /var/data/era
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: SKIP_AUTH
        value: "false"
