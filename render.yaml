services:
  - type: web
    name: era-cloud-api
    runtime: node
    buildCommand: npm ci --workspaces --if-present && npm run deploy:api
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_DRIVER
        value: memory
      - key: API_HOST
        value: 0.0.0.0
      - key: API_PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: SKIP_AUTH
        value: "false"
